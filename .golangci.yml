version: "2"

run:
  timeout: 5m
  allow-parallel-runners: true

issues: {}

linters:
  default: none
  enable:
    - dupl
    - errcheck
    - ginkgolinter
    # - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - prealloc
    - revive
    # - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    revive:
      rules:
        - name: comment-spacings
  exclusions:
    # don't skip warning about doc comments
    # don't exclude the default set of lint
    presets: []
    # restore some of the defaults
    # (fill in the rest as needed)
    rules:
      - path: "api/*"
        linters:
          - lll
      - path: "internal/*"
        linters:
          - dupl
          - lll




formatters:
  enable:
    - gofmt
    #- gofumpt
    - goimports