# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.2

    - name: Install yq
      run: |
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.5/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq

    - name: Set up Go
      uses: actions/setup-go@v6.4.0
      with:
        go-version: '1.25.10'

    - name: Manifests
      run: make manifests

    - name: Set up Helm
      uses: azure/setup-helm@v4.3.1
      with:
        version: v3.17.3

    - name: Lint Helm charts
      run: make copy-crd copy-rbac helm-lint

    - name: Generate
      run: make generate

    - name: Format
      run: make fmt

    - name: Vet
      run: make vet

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9.2.1
      with:
        version: v2.12.2

    - name: Build
      run: make go-build

    - name: Test
      run: make test
