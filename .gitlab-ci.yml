stages:
  - test
  - build
  - e2e
  - security

variables:
  DOCKER_REGISTRY: registry.gitlab.com
  IMAGE_NAME: $DOCKER_REGISTRY/emeland/k8s-model
  GO_VERSION: "1.24"

# Include GitLab security templates
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml

# Go tests
test:
  stage: test
  image: golang:${GO_VERSION}
  script:
    - make test

# End-to-end tests in Kind cluster
# Test currently disabled, as kind setup is flaky in CI environment
e2e-test:
  rules:
    #- if: $CI_COMMIT_TAG
    #- if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    #- if: $CI_MERGE_REQUEST_ID
    - when: never
  stage: e2e
  image: kindest/node:v1.24.0
  services:
    - docker:20.10.16-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
    KIND_VERSION: "v0.17.0"
    KUBECTL_VERSION: "v1.24.0"
  before_script:
    # Install required tools
    - apt-get update && apt-get install -y curl make git
    # Install kubectl
    - curl -Lo kubectl https://storage.googleapis.com/kubernetes-release/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    # Install kind
    - curl -Lo ./kind https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64
    - chmod +x ./kind && mv ./kind /usr/local/bin/
    # Install Go
    - curl -Lo go.tar.gz https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz
    - tar -C /usr/local -xzf go.tar.gz
    - export PATH=$PATH:/usr/local/go/bin
    # Setup Docker client
    - mkdir -p $DOCKER_CERT_PATH
    - echo "$DOCKER_AUTH_CONFIG" > $HOME/.docker/config.json
  script:
    - chmod +x hack/ci/e2e-test.sh
    - ./hack/ci/e2e-test.sh

# Build and push operator image
build-operator:
  stage: build
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
        tag="latest"
      else
        tag="$CI_COMMIT_REF_SLUG"
      fi
    - docker build -t $IMAGE_NAME:$tag .
    - docker push $IMAGE_NAME:$tag
    - |
      if [[ -n "$CI_COMMIT_TAG" ]]; then
        docker tag $IMAGE_NAME:$tag $IMAGE_NAME:$CI_COMMIT_TAG
        docker push $IMAGE_NAME:$CI_COMMIT_TAG
      fi
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_MERGE_REQUEST_ID

# Security scanning
container_scanning:
  rules:
    - when: never
  stage: security
  variables:
    CS_IMAGE: $IMAGE_NAME:$CI_COMMIT_REF_SLUG

sast:
  stage: security

secret_detection:
  stage: security
