{{- if and .Values.rbac.create .Values.rbac.metricsReader.enabled (gt (len .Values.rbac.metricsReader.subjects) 0) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "modelsrv-k8s-sensor.fullname" . }}-metrics-reader
  labels:
    {{- include "modelsrv-k8s-sensor.labels" . | nindent 4 }}
rules:
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "modelsrv-k8s-sensor.fullname" . }}-metrics-reader
  labels:
    {{- include "modelsrv-k8s-sensor.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "modelsrv-k8s-sensor.fullname" . }}-metrics-reader
subjects:
{{- toYaml .Values.rbac.metricsReader.subjects | nindent 2 }}
{{- end }}
