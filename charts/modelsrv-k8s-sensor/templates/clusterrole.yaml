{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "modelsrv-k8s-sensor.fullname" . }}-manager
  labels:
    {{- include "modelsrv-k8s-sensor.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - apps
    resources:
      - daemonsets
      - deployments
      - statefulsets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - batch
    resources:
      - cronjobs
      - jobs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - structure.emeland.io
    resources:
      - apis
      - components
      - systeminstances
      - systems
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "modelsrv-k8s-sensor.fullname" . }}-manager
  labels:
    {{- include "modelsrv-k8s-sensor.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "modelsrv-k8s-sensor.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "modelsrv-k8s-sensor.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
