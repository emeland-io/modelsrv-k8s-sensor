---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: systeminstances.structure.emeland.io
spec:
  group: structure.emeland.io
  names:
    kind: SystemInstance
    listKind: SystemInstanceList
    plural: systeminstances
    singular: systeminstance
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SystemInstance records one concrete realization of an abstract Phase 1 System in a deployment
          context—the live slice of landscape where Components wire through APIs versus the blueprint-only
          System resource. Instances capture how communicated relationships materialize across environments while
          the parent System hierarchy still governs structure at the blueprint layer (Phase 1 currently keeps
          parent relationships on System, not duplicated on instances). See Phase 1: System Structure —
          https://emeland.io/docs/model/phase1-system-structure/.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              Identifies which running System occurrence this Instance represents—including the blueprint
              System it instantiates—and human-oriented labels automation can surface in consoles.
            properties:
              displayName:
                description: |-
                  Human-friendly label for operators to recognise this occurrence. Automated systems SHOULD
                  continue to key off instanceId; aim for uniqueness across broader IT footprints when
                  possible.
                type: string
              instanceId:
                description: |-
                  Stable machine identifier for this SystemInstance—use this when correlating runtime signals,
                  inventories, or EmELand identity mappings back to Phase 1 structure.
                type: string
              systemId:
                description: |-
                  UUID linkage to the abstract System blueprint this occurrence represents within Phase 1—use
                  it to anchor runtime inventory and observability signals on the modeled System definition.
                type: string
            required:
            - displayName
            - instanceId
            - systemId
            type: object
          status:
            description: SystemInstanceStatus defines the observed state of SystemInstance
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
