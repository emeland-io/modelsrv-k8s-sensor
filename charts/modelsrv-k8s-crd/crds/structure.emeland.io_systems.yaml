---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: systems.structure.emeland.io
spec:
  group: structure.emeland.io
  names:
    kind: System
    listKind: SystemList
    plural: systems
    singular: system
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          System is a Phase 1 EmELand resource—a foundational blueprint for part of your landscape.
          Components and APIs belong to Systems; hierarchical Systems (and Sub-Systems) compose larger
          designs through Parent relationships. Abstract Systems capture intent without implying a runnable
          internal composition—often documenting externally provided APIs. A concrete System blueprint is
          versioned separately from where it runs; running contexts use SystemInstance. See Phase 1:
          System Structure — https://emeland.io/docs/model/phase1-system-structure/.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              Blueprint-level definition of this System within Phase 1. Subordinate Systems specialize a
              parent via parentRef; every System MUST carry version metadata describing the blueprint.
            properties:
              abstract:
                description: |-
                  When true this System acts as an abstract subsystem (black-box view): Phase 1 allows it
                  to document externally visible APIs without enumerating inner Components—the internal
                  implementation is deliberately omitted so vendor or appliance boundaries remain opaque while
                  you still declare communication intersections.
                type: boolean
              description:
                description: Description is a short description of the system
                type: string
              displayName:
                description: DisplayName is the human friendly name of the system
                type: string
              parentRef:
                description: |-
                  References the Parent System blueprint (name + version) when this System is positioned
                  in the hierarchical structure of Phase 1. A Parent System MAY be instantiated without
                  forcing every child Sub-System blueprint to instantiate—overall compositions become optional
                  at deployment time via SystemInstance granularity.
                properties:
                  name:
                    description: Name of the entity to reference.
                    type: string
                  version:
                    description: Version of the blueprint to reference
                    type: string
                required:
                - name
                - version
                type: object
              systemId:
                description: |-
                  SystemId is the unique identifier of the system. It is optional to allow
                  the controller to assign an ID automatically if not provided by the user.
                type: string
              version:
                description: |-
                  Version metadata for this System blueprint. Systems MUST be versioned in Phase 1; when multiple
                  concurrent versions remain valid the matching SystemInstance must record which blueprint
                  version applies in its context.
                properties:
                  availableFrom:
                    description: AvailableFrom is the date when this version became
                      available.
                    format: date
                    type: string
                  deprecatedFrom:
                    description: DeprecatedFrom is the date when this version became
                      deprecated.
                    format: date
                    type: string
                  terminatedFrom:
                    description: TerminatedFrom is the date when this version became
                      terminated.
                    format: date
                    type: string
                  version:
                    description: Version is the identifier of the version, e.g. "1.0.0".
                      The use of semantic versioning is recommended.
                    type: string
                required:
                - version
                type: object
            required:
            - displayName
            - version
            type: object
          status:
            description: SystemStatus defines the observed state of System
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
