---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: apis.structure.emeland.io
spec:
  group: structure.emeland.io
  names:
    kind: API
    listKind: APIList
    plural: apis
    singular: api
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          API is a Phase 1 EmELand resource describing a potential communication channel between
          components. In concrete mappings it may encompass many techniques at once—a Kubernetes Service,
          an Ingress, a load balancer, firewall rules, and similar—all treated as facets of one logical
          interface. APIs belong to a System together with Components. See Phase 1: System Structure —
          https://emeland.io/docs/model/phase1-system-structure/.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              Desired state for this logical API blueprint within its System. EmELand Phase 1 models
              the interface abstraction; pairing one providing Component and consumers is expressed
              through Component provides/consumes relationships (and instance-level resources when used).
            properties:
              apiId:
                description: |-
                  apiId is the unique identifier of the API. It is optional to allow
                  the controller to assign an ID automatically if not provided by the user.
                type: string
              description:
                description: Description is a short description of the API
                type: string
              displayName:
                description: DisplayName is the human friendly name of the API
                type: string
              systemId:
                description: SystemId is a reference to the system by UUID, that this
                  API belongs to. Either SystemRef or SystemId must be set.
                type: string
              systemRef:
                description: Reference to the System (name and version) that owns this API. Either
                  SystemRef or SystemId must be set.
                properties:
                  name:
                    description: Name of the entity to reference.
                    type: string
                  version:
                    description: Version of the blueprint to reference
                    type: string
                required:
                - name
                - version
                type: object
              type:
                description: |-
                  Classify the technical style of this API surface (OpenAPI, GraphQL, gRPC, Other). In
                  Phase 1 the API type is model metadata; how it maps to running infrastructure is
                  defined by your mapping implementation.
                enum:
                - OpenAPI
                - GraphQL
                - gRPC
                - Other
                type: string
              version:
                description: |-
                  Version metadata for this API definition. EmELand recommends semantic versioning; APIs
                  SHOULD be versioned under Phase 1 rules.
                properties:
                  availableFrom:
                    description: AvailableFrom is the date when this version became
                      available.
                    format: date
                    type: string
                  deprecatedFrom:
                    description: DeprecatedFrom is the date when this version became
                      deprecated.
                    format: date
                    type: string
                  terminatedFrom:
                    description: TerminatedFrom is the date when this version became
                      terminated.
                    format: date
                    type: string
                  version:
                    description: Version is the identifier of the version, e.g. "1.0.0".
                      The use of semantic versioning is recommended.
                    type: string
                required:
                - version
                type: object
            required:
            - displayName
            - systemRef
            - type
            - version
            type: object
          status:
            description: APIStatus defines the observed state of API
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
